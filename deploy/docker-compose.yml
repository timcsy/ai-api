services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aiapi
      POSTGRES_PASSWORD: aiapi
      POSTGRES_DB: aiapi
    ports:
      - "5432:5432"
    volumes:
      - aiapi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiapi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aiapi_pgdata: {}
