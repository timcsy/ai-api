apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-api.fullname" . }}-secrets
  labels:
    {{- include "ai-api.labels" . | nindent 4 }}
  annotations:
    # Secret must exist before pre-install migration Job consumes it via envFrom.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  ADMIN_BOOTSTRAP_TOKEN: {{ required "adminBootstrapToken is required" .Values.adminBootstrapToken | quote }}
  AZURE_OPENAI_API_BASE: {{ required "azureOpenAI.apiBase is required" .Values.azureOpenAI.apiBase | quote }}
  AZURE_OPENAI_API_KEY: {{ required "azureOpenAI.apiKey is required" .Values.azureOpenAI.apiKey | quote }}
  AZURE_OPENAI_API_VERSION: {{ .Values.azureOpenAI.apiVersion | quote }}
  DATABASE_URL: {{ required "database.url is required" .Values.database.url | quote }}
  BASE_URL: {{ .Values.baseUrl | default "http://localhost:8000" | quote }}
  COOKIE_SECURE: {{ .Values.cookieSecure | default false | quote }}
  COOKIE_DOMAIN: {{ .Values.cookieDomain | default "" | quote }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.googleOauth.clientId | default "" | quote }}
  GOOGLE_OAUTH_CLIENT_SECRET: {{ .Values.googleOauth.clientSecret | default "" | quote }}
  GOOGLE_DISCOVERY_URL: {{ .Values.googleOauth.discoveryUrl | default "https://accounts.google.com/.well-known/openid-configuration" | quote }}
  CORS_ORIGINS: {{ .Values.corsOrigins | default "[]" | quote }}
  POOL_TOTAL_TOKENS_PER_MONTH: {{ .Values.pool.totalTokensPerMonth | default 0 | quote }}
  POOL_FLOOR_PER_ALLOCATION: {{ .Values.pool.floorPerAllocation | default 1000 | quote }}
  # Phase 5: Fernet symmetric key for ProviderCredential encryption at rest.
  # 32-byte url-safe base64 (e.g., python -c "from cryptography.fernet import
  # Fernet; print(Fernet.generate_key().decode())"). Pod refuses to start
  # without it (SC-006).
  PROVIDER_KEY_ENC_KEY: {{ required "providerKeyEncKey is required (32-byte url-safe base64 Fernet key)" .Values.providerKeyEncKey | quote }}
