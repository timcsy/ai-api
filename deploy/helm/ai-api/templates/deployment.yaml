apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-api.fullname" . }}
  labels:
    {{- include "ai-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ai-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /home/nonroot/.cache }
          envFrom:
            - secretRef:
                name: {{ include "ai-api.fullname" . }}-secrets
          env:
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: REQUEST_BODY_LIMIT_MB
              value: {{ .Values.requestBodyLimitMB | quote }}
            - name: DB_POOL_SIZE
              value: {{ .Values.database.poolSize | quote }}
            - name: DB_MAX_OVERFLOW
              value: {{ .Values.database.maxOverflow | quote }}
            - name: DB_POOL_TIMEOUT
              value: {{ .Values.database.poolTimeout | quote }}
            - name: DB_POOL_RECYCLE
              value: {{ .Values.database.poolRecycle | quote }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: cache, emptyDir: {} }
