{{- if .Values.upstreamBurstDetector.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "ai-api.fullname" . }}-upstream-burst
  labels:
    {{- include "ai-api.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.upstreamBurstDetector.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "ai-api.selectorLabels" . | nindent 12 }}
            job: upstream-burst
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: Never
          containers:
            - name: upstream-burst
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              envFrom:
                - secretRef:
                    name: {{ include "ai-api.fullname" . }}-secrets
              env:
                - name: UPSTREAM_BURST_THRESHOLD
                  value: {{ .Values.upstreamBurstDetector.thresholdCalls | quote }}
                - name: UPSTREAM_BURST_WINDOW_MINUTES
                  value: {{ .Values.upstreamBurstDetector.windowMinutes | quote }}
              command: ["python3", "-m", "ai_api.cli.run_upstream_burst_detector"]
{{- end }}
