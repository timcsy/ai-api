{{- if .Values.frontend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-api.fullname" . }}-frontend
  labels:
    {{- include "ai-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-api.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}
