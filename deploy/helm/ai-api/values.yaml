image:
  # Renovate watches these tags via renovate.json
  repository: ghcr.io/timcsy/ai-api
  tag: "main"
  # LiteLLM is a Python dependency — its version is pinned in pyproject.toml
  # and bumped via Renovate PRs against `pyproject.toml`.
  pullPolicy: IfNotPresent

imagePullSecrets: []
# Example:
# imagePullSecrets:
#   - name: ghcr-pull

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: "nginx"
  host: "aiapi.example.com"
  annotations:
    # Lift ingress-nginx 1MB default — AI payloads (images, long contexts) routinely exceed it.
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  # Backend path prefixes — order matters (longest-prefix wins via ingress controller).
  # Must match src/ai_api/main.py router prefixes (Phase 3b.0 routing contract).
  backendPaths:
    - /health
    - /auth/
    - /me/
    - /admin/
    - /catalog/
    - /v1/
  tls:
    enabled: false
    secretName: ""

# Phase 3b.0: frontend SPA (nginx pod)
frontend:
  enabled: false
  replicaCount: 2
  image:
    repository: ghcr.io/timcsy/ai-api-frontend
    tag: "main"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Secrets — provide via --set / sealed-secrets / external-secrets in real env.
adminBootstrapToken: ""
azureOpenAI:
  apiBase: ""
  apiKey: ""
  apiVersion: "2024-06-01"
# Phase 5: Fernet 32-byte url-safe base64 key for ProviderCredential encryption.
# REQUIRED. Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
# Pod will refuse to start without this (SC-006).
providerKeyEncKey: ""

database:
  # External Postgres URL (asyncpg). e.g. postgresql+asyncpg://user:pass@host:5432/db
  url: ""

# Phase 2: auth
baseUrl: "http://localhost:8000"
cookieSecure: false
cookieDomain: ""
googleOauth:
  clientId: ""
  clientSecret: ""
  discoveryUrl: "https://accounts.google.com/.well-known/openid-configuration"

logging:
  level: INFO

migrationJob:
  enabled: true
  backoffLimit: 3

# Phase 017: first-admin provisioning. Runs as a pre-install/pre-upgrade hook
# Job AFTER the migration job and BEFORE the app rolls out (idempotent — safe to
# re-run every upgrade). The named member becomes admin; for google_oidc they
# bind on first Google login, for local_password an invitation is printed to the
# Job logs. Job is only rendered when enabled AND email is non-empty.
bootstrapAdmin:
  enabled: false
  email: ""
  provider: "google_oidc"   # google_oidc | local_password
  displayName: ""
  backoffLimit: 3

# Phase 2.5 hardening
networkPolicy:
  enabled: true
  postgresPodSelector:
    app: ai-api-pg

anomalyDetector:
  enabled: true
  schedule: "*/5 * * * *"

# Phase 3a: CORS for upcoming 3b SPA. Empty string = disabled.
# Example: '["https://admin.example.com"]'
corsOrigins: "[]"

# Phase 3c: adaptive quota pool rebalance — runs on the 1st of every month UTC.
rebalanceCron:
  enabled: true
  schedule: "0 0 1 * *"

# Phase 11: purge expired stored_responses (server-side conversation state).
storedResponseCleanup:
  enabled: true
  schedule: "0 3 * * *"  # daily 03:00 UTC

# Phase 3c quota pool settings
pool:
  totalTokensPerMonth: 0  # 0 = pool disabled
  floorPerAllocation: 1000

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  liveness:
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
