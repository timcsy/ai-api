openapi: 3.0.3
info:
  title: Per-device credentials (Phase 18)
  version: 0.1.0
  description: |
    一筆分配可掛多把獨立的 per-device 具名憑證。member 自助管理自己的；admin 管理全部。
    token 明文僅在新增時回一次，平台只存雜湊。Spec: specs/028-per-device-credentials/spec.md。
    既有 proxy/auth/計費契約不變（token 解析仍 fingerprint → 分配）。

servers:
  - url: /

components:
  securitySchemes:
    MemberSession: { type: apiKey, in: cookie, name: session }
    AdminToken: { type: apiKey, in: header, name: X-Admin-Token }

  schemas:
    Credential:
      type: object
      properties:
        id: { type: string }
        name: { type: string, description: 裝置名 }
        token_prefix: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [active, revoked] }
      required: [id, name, token_prefix, created_at, status]

    CredentialCreated:
      type: object
      description: 僅在新增時回一次明文 token
      properties:
        id: { type: string }
        name: { type: string }
        token: { type: string, description: 明文，只顯示這一次 }
        token_prefix: { type: string }
      required: [id, name, token, token_prefix]

    AddCredentialRequest:
      type: object
      properties:
        name: { type: string, description: 裝置名，必填 }
      required: [name]

paths:
  /me/allocations/{allocation_id}/credentials:
    get:
      summary: 列出我這筆分配的所有憑證（不含明文）
      operationId: listMyCredentials
      security: [{ MemberSession: [] }]
      parameters: [{ name: allocation_id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: 憑證清單, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Credential' } } } } }
        '403': { description: 非本人分配 }
        '404': { description: 分配不存在 }
    post:
      summary: 為這台裝置新增一把憑證（回明文一次）
      operationId: addMyCredential
      security: [{ MemberSession: [] }]
      parameters: [{ name: allocation_id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AddCredentialRequest' } } } }
      responses:
        '201': { description: 已新增, content: { application/json: { schema: { $ref: '#/components/schemas/CredentialCreated' } } } }
        '403': { description: 非本人分配 }

  /me/allocations/{allocation_id}/credentials/{credential_id}:
    delete:
      summary: 撤回我的某一把憑證（不影響其他）
      operationId: revokeMyCredential
      security: [{ MemberSession: [] }]
      parameters:
        - { name: allocation_id, in: path, required: true, schema: { type: string } }
        - { name: credential_id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: 已撤回 }
        '403': { description: 非本人憑證 }
        '404': { description: 不存在 }

  /admin/allocations/{allocation_id}/credentials:
    get:
      summary: （admin）列出某分配的所有憑證
      operationId: adminListCredentials
      security: [{ AdminToken: [] }]
      parameters: [{ name: allocation_id, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: 憑證清單, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Credential' } } } } }
        '401': { description: 未認證 }

  /admin/allocations/{allocation_id}/credentials/{credential_id}:
    delete:
      summary: （admin）撤回某一把憑證（留稽核）
      operationId: adminRevokeCredential
      security: [{ AdminToken: [] }]
      parameters:
        - { name: allocation_id, in: path, required: true, schema: { type: string } }
        - { name: credential_id, in: path, required: true, schema: { type: string } }
      responses:
        '204': { description: 已撤回（含稽核） }
        '401': { description: 未認證 }
        '404': { description: 不存在 }

# ---- 契約測試應斷言 ----
# 1. add 回明文一次 + 之後該 token 可呼叫；list 不含明文。
# 2. 同分配多把皆可呼叫、皆歸該分配用量。
# 3. revoke 一把 → 該把被拒、其他仍可用（不連坐）。
# 4. member 對「他人」分配/憑證 GET/POST/DELETE → 403（owner-isolation）。
# 5. admin revoke 留稽核紀錄。
# 6. 既有 token（migration 後）仍可呼叫（零回歸）。
