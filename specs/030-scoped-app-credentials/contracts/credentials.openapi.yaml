openapi: 3.0.3
info:
  title: Scoped application credentials (Phase 20)
  version: 0.1.0
  description: |
    憑證升級為「成員擁有、可命名的應用 key，scope = 一組分配（M:N）」。成員自助管理自己的
    （scope 限自己的分配）；admin 管理全部。呼叫依 request 的 model 在 scope 內挑分配計費。
    既有 proxy/auth/計費契約不變（仍 fingerprint→credential，但 model 決定哪筆分配計費）。
    Spec: specs/030-scoped-app-credentials/spec.md。

servers: [{ url: / }]

components:
  securitySchemes:
    MemberSession: { type: apiKey, in: cookie, name: session }
    AdminToken: { type: apiKey, in: header, name: X-Admin-Token }
  schemas:
    AllocationRef:
      type: object
      properties:
        allocation_id: { type: string }
        resource_model: { type: string }
        display_name: { type: string, nullable: true }
        status: { type: string }
      required: [allocation_id, resource_model]
    AppCredential:
      type: object
      description: 應用 key（不含明文）
      properties:
        id: { type: string }
        name: { type: string }
        token_prefix: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [active, revoked] }
        allocations:
          type: array
          items: { $ref: '#/components/schemas/AllocationRef' }
      required: [id, name, token_prefix, created_at, status, allocations]
    AppCredentialCreated:
      type: object
      description: 僅建立時回一次明文
      properties:
        id: { type: string }
        name: { type: string }
        token: { type: string }
        token_prefix: { type: string }
        allocations: { type: array, items: { $ref: '#/components/schemas/AllocationRef' } }
      required: [id, name, token, token_prefix, allocations]
    CreateCredentialRequest:
      type: object
      properties:
        name: { type: string }
        allocation_ids:
          type: array
          minItems: 1
          items: { type: string }
          description: scope（≥1，皆須擁有者；model 不得重複）
      required: [name, allocation_ids]
    ScopePatchRequest:
      type: object
      description: 增/刪 scope 內分配（至少保留 1 筆）
      properties:
        add: { type: array, items: { type: string } }
        remove: { type: array, items: { type: string } }

paths:
  /me/credentials:
    get:
      summary: 列出我的所有應用 key（成員層，不含明文）
      operationId: listMyCredentials
      security: [{ MemberSession: [] }]
      responses:
        '200': { description: 清單, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AppCredential' } } } } }
        '401': { description: 未登入 }
    post:
      summary: 建立一把應用 key（命名 + 勾選我的分配；回明文一次）
      operationId: createMyCredential
      security: [{ MemberSession: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CreateCredentialRequest' } } } }
      responses:
        '201': { description: 已建立, content: { application/json: { schema: { $ref: '#/components/schemas/AppCredentialCreated' } } } }
        '403': { description: scope 含非本人分配 }
        '409': { description: scope 內 model 重複 }

  /me/credentials/{credential_id}:
    delete:
      summary: 撤回我的某把 key（其所有 model 失效；不影響其他 key）
      operationId: revokeMyCredential
      security: [{ MemberSession: [] }]
      parameters: [{ name: credential_id, in: path, required: true, schema: { type: string } }]
      responses: { '204': { description: 已撤回 }, '403': { description: 非本人 }, '404': { description: 不存在 } }
    patch:
      summary: 調整 scope（增/刪可用分配；至少保留 1 筆）
      operationId: patchMyCredentialScope
      security: [{ MemberSession: [] }]
      parameters: [{ name: credential_id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ScopePatchRequest' } } } }
      responses:
        '200': { description: 更新後的 key, content: { application/json: { schema: { $ref: '#/components/schemas/AppCredential' } } } }
        '403': { description: 加入非本人分配 }
        '404': { description: 不存在 }
        '409': { description: model 重複 / 移除至 0 }

  /me/credentials/{credential_id}/rotate:
    post:
      summary: 就地換 token（scope 不變、舊 token 立即失效；回明文一次）
      operationId: rotateMyCredential
      security: [{ MemberSession: [] }]
      parameters: [{ name: credential_id, in: path, required: true, schema: { type: string } }]
      responses: { '201': { description: 新 token, content: { application/json: { schema: { $ref: '#/components/schemas/AppCredentialCreated' } } } }, '404': { description: 不存在 } }

  /admin/members/{member_id}/credentials:
    get:
      summary: （admin）列出某成員的所有應用 key
      operationId: adminListMemberCredentials
      security: [{ AdminToken: [] }]
      parameters: [{ name: member_id, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: 清單, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/AppCredential' } } } } }, '401': { description: 未認證 } }

  /admin/credentials/{credential_id}:
    delete:
      summary: （admin）撤回任一成員的某把 key（留稽核）
      operationId: adminRevokeCredential
      security: [{ AdminToken: [] }]
      parameters: [{ name: credential_id, in: path, required: true, schema: { type: string } }]
      responses: { '204': { description: 已撤回 }, '401': { description: 未認證 }, '404': { description: 不存在 } }
    patch:
      summary: （admin）調整某把 key 的 scope（留稽核）
      operationId: adminPatchCredentialScope
      security: [{ AdminToken: [] }]
      parameters: [{ name: credential_id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ScopePatchRequest' } } } }
      responses: { '200': { description: 更新後, content: { application/json: { schema: { $ref: '#/components/schemas/AppCredential' } } } }, '401': { description: 未認證 }, '409': { description: model 重複 / 移除至 0 } }

  /me/device/{user_code}/approve:
    post:
      summary: （member）device-flow 核可——改接受**多筆**分配 → mint 一把 scope 涵蓋它們的 key
      operationId: approveDeviceMultiAlloc
      security: [{ MemberSession: [] }]
      parameters: [{ name: user_code, in: path, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { allocation_ids: { type: array, minItems: 1, items: { type: string } } }
              required: [allocation_ids]
      responses: { '204': { description: 已核可（key 已 mint，scope=所選分配） }, '403': { description: 含非本人分配 }, '404': { description: 不存在/逾時 } }

# ---- 契約測試應斷言 ----
# 1. create 回明文一次 + scope 多分配；list/patch 不含明文。
# 2. 一把 token 打 scope 內 ≥2 model 皆成功、各自歸戶該分配；打 scope 外 model → 403 model_mismatch、0 計費。
# 3. scope 內 model 重複 → 409；scope 加非本人分配 → 403；移除至 0 → 409。
# 4. revoke 一把 → 其所有 model 失效、其他 key 不受影響。
# 5. patch 加分配 → 同 token 立刻可打；移除 → 立刻不可打。
# 6. admin 可列/撤/改任一成員的 key（留稽核）；成員不可碰他人 key/分配。
# 7. device-flow approve 多筆 → mint 涵蓋多 model 的 key。
# 8. 既有單分配 token（migration 後）呼叫/歸戶不變（零回歸）。
