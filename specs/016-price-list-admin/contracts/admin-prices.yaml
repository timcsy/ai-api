openapi: 3.0.3
info:
  title: Admin Price List API
  version: 0.1.0
  description: |
    Phase 7 — admin views per-model current/historical prices and adds
    append-only point-in-time price versions. Reuses the existing price_list
    table; no schema change. All admin-only.
servers:
  - url: /admin
security:
  - sessionCookie: []
  - adminToken: []
paths:
  /prices:
    get:
      summary: List catalog models with their current effective price (or unpriced)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CatalogPriceRow" }
    post:
      summary: Add an append-only price version for (provider, model)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PriceCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PriceVersion" }
        "409":
          description: "`duplicate_version`: (provider, model, effective_from) already exists"
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorBody" } } }
        "422":
          description: "`invalid_price`: negative/non-numeric unit price or bad effective_from"
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorBody" } } }
  /prices/history:
    get:
      summary: All price versions for a (provider, model) key
      parameters:
        - in: query
          name: provider
          required: true
          schema: { type: string }
        - in: query
          name: model
          required: true
          schema: { type: string, description: "prefix-stripped model key, e.g. gpt-5.4-mini" }
      responses:
        "200":
          description: OK (newest effective_from first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PriceVersion" }
components:
  securitySchemes:
    sessionCookie: { type: apiKey, in: cookie, name: session }
    adminToken: { type: apiKey, in: header, name: X-Admin-Token }
  schemas:
    CurrentPrice:
      type: object
      required: [input_per_1k, output_per_1k, effective_from]
      properties:
        input_per_1k: { type: string, description: "USD per 1K tokens (decimal as string)" }
        output_per_1k: { type: string }
        effective_from: { type: string, format: date-time }
    CatalogPriceRow:
      type: object
      required: [provider, model, slug, display_name, priced, current]
      properties:
        provider: { type: string }
        model: { type: string, description: "prefix-stripped key used by billing" }
        slug: { type: string, description: "catalog slug for display" }
        display_name: { type: string }
        priced: { type: boolean }
        current:
          oneOf:
            - { $ref: "#/components/schemas/CurrentPrice" }
            - { type: "null" }
    PriceCreate:
      type: object
      required: [provider, model, input_per_1k, output_per_1k, effective_from]
      properties:
        provider: { type: string }
        model: { type: string }
        input_per_1k: { type: string, description: "decimal as string, >= 0" }
        output_per_1k: { type: string }
        effective_from: { type: string, format: date-time }
        source_note: { type: string, nullable: true }
    PriceVersion:
      type: object
      required: [id, input_per_1k, output_per_1k, effective_from, created_at, created_by, is_current]
      properties:
        id: { type: string }
        input_per_1k: { type: string }
        output_per_1k: { type: string }
        effective_from: { type: string, format: date-time }
        source_note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        is_current: { type: boolean }
    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
